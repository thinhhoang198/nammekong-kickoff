<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Trang riêng tư: chỉ chia sẻ link trực tiếp, KHÔNG cho Google index -->
    <meta name="robots" content="noindex, nofollow" />

    <title>Tạo thiệp online — Nam Mekong Grand Plaza</title>
    <meta
      name="description"
      content="Tạo thiệp cá nhân hóa cho sự kiện Nam Mekong Grand Plaza chỉ trong vài giây — nhập thông tin, nhận ngay thiệp đẹp sẵn sàng chia sẻ lên Facebook và Zalo."
    />
    <meta name="author" content="Nam Mekong Group" />
    <meta name="theme-color" content="#030814" />

    <!-- Favicon (file thực tế là .ico) -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/assets/logo.png" />

    <!-- ============================================================
         Open Graph (Facebook / Zalo). og:image phải là URL TUYỆT ĐỐI.
         👉 Nếu đổi domain, chỉ cần sửa hằng số bên dưới cho khớp.
         (Trang con /preview có thể override og:image động sau này.)
    ============================================================ -->
    <meta property="og:site_name" content="Nam Mekong Grand Plaza" />
    <meta property="og:locale" content="vi_VN" />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://invitation-nammekonggroup.vercel.app/"
    />
    <meta
      property="og:title"
      content="Tạo thiệp online — Nam Mekong Grand Plaza"
    />
    <meta
      property="og:description"
      content="Nhập thông tin của bạn để nhận thiệp cá nhân hóa cho sự kiện Nam Mekong Grand Plaza"
    />
    <meta
      property="og:image"
      content="https://invitation-nammekonggroup.vercel.app/assets/event1.png"
    />
    <meta property="og:image:width" content="1080" />
    <meta property="og:image:height" content="1350" />
    <meta
      property="og:image:alt"
      content="Thiệp sự kiện Nam Mekong Grand Plaza"
    />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Tạo thiệp online — Nam Mekong Grand Plaza"
    />
    <meta
      name="twitter:description"
      content="Nhập thông tin để nhận thiệp cá nhân hóa cho sự kiện"
    />
    <meta
      name="twitter:image"
      content="https://invitation-nammekonggroup.vercel.app/assets/event1.png"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Be+Vietnam+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
